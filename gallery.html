  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-next" aria-label="Next">&#8250;</button>
  </div>

  <footer>&copy; <script>document.write(new Date().getFullYear())</script> Ahmad Beyh</footer>

  <script>
    (() => {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const images = [...document.querySelectorAll('.gallery-grid img')];
      let currentIndex = 0;

      // Fade-in thumbnails on scroll
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
      }, { threshold: 0.1 });
      images.forEach(img => observer.observe(img));

      // Lightbox with crossfade
      function show(index) {
        currentIndex = (index + images.length) % images.length;
        lightboxImg.style.opacity = 0;
        setTimeout(() => {
          lightboxImg.src = images[currentIndex].dataset.full;
          lightboxImg.onload = () => { lightboxImg.style.opacity = 1; };
        }, 200);
      }

      function open(index) {
        currentIndex = (index + images.length) % images.length;
        lightboxImg.style.opacity = 0;
        lightboxImg.src = images[currentIndex].dataset.full;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
        lightboxImg.onload = () => { lightboxImg.style.opacity = 1; };
      }

      function close() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      }

      images.forEach((img, i) => img.addEventListener('click', () => open(i)));

      lightbox.querySelector('.lightbox-close').addEventListener('click', close);
      lightbox.querySelector('.lightbox-prev').addEventListener('click', () => show(currentIndex - 1));
      lightbox.querySelector('.lightbox-next').addEventListener('click', () => show(currentIndex + 1));
      lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });

      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') show(currentIndex - 1);
        if (e.key === 'ArrowRight') show(currentIndex + 1);
      });

      // Touch swipe support
      let touchStartX = 0;
      lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; });
      lightbox.addEventListener('touchend', e => {
        const diff = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(diff) > 50) show(currentIndex + (diff > 0 ? -1 : 1));
      });
    })();
  </script>
